name: 👑 Build APK - Professional

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: '📱 اسم التطبيق'
        required: true
        default: 'Dark AI'
        type: string
      app_id:
        description: '🆔 App ID (مثال: com.darkai.app)'
        required: true
        default: 'com.darkai.app'
        type: string
      app_color:
        description: '🎨 لون خلفية التطبيق'
        required: true
        default: '#000000'
        type: string
      icon_file:
        description: '🖼️ اسم ملف الأيقونة PNG'
        required: true
        default: 'icon.png'
        type: string
      site_folder:
        description: '📁 مجلد موقع الويب'
        required: false
        default: ''
        type: string
      version_name:
        description: '📌 إصدار التطبيق'
        required: false
        default: '1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: 👑 بناء تطبيق ${{ github.event.inputs.app_name }}
    runs-on: ubuntu-latest
    
    steps:
      # ═══════════════════════════════════════
      # 📥 تحميل المشروع
      # ═══════════════════════════════════════
      - name: 📥 تحميل المشروع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ═══════════════════════════════════════
      # ☕ تثبيت Java
      # ═══════════════════════════════════════
      - name: ☕ تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ═══════════════════════════════════════
      # 🟢 تثبيت Node.js
      # ═══════════════════════════════════════
      - name: 🟢 تثبيت Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ═══════════════════════════════════════
      # 📦 تثبيت الأدوات
      # ═══════════════════════════════════════
      - name: 📦 تثبيت Capacitor والأدوات
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick

      # ═══════════════════════════════════════
      # 📁 تجهيز ملفات الموقع
      # ═══════════════════════════════════════
      - name: 📁 سحب وتجهيز جميع ملفات الموقع
        run: |
          echo "🔍 جاري تجهيز ملفات الموقع..."
          
          rm -rf www
          mkdir -p www
          
          SOURCE_DIR="${{ github.event.inputs.site_folder }}"
          if [ -z "$SOURCE_DIR" ]; then
            SOURCE_DIR="."
          fi
          
          echo "📁 نسخ الملفات من: $SOURCE_DIR"
          
          if [ "$SOURCE_DIR" = "." ]; then
            shopt -s dotglob
            for item in "$SOURCE_DIR"/*; do
              basename=$(basename "$item")
              if [ "$basename" != ".git" ] && [ "$basename" != ".github" ] && [ "$basename" != "node_modules" ] && [ "$basename" != "android" ] && [ "$basename" != "ios" ] && [ "$basename" != "www" ] && [ "$basename" != "package.json" ] && [ "$basename" != "package-lock.json" ] && [ "$basename" != "capacitor.config.json" ]; then
                cp -r "$item" www/ 2>/dev/null || true
              fi
            done
          else
            if [ -d "$SOURCE_DIR" ]; then
              cp -r "$SOURCE_DIR"/* www/ 2>/dev/null || true
              cp -r "$SOURCE_DIR"/.* www/ 2>/dev/null || true
            fi
          fi
          
          rm -rf www/.git www/.github www/node_modules www/.gitignore 2>/dev/null || true
          rm -rf www/package.json www/package-lock.json 2>/dev/null || true
          rm -rf www/android www/ios www/capacitor.config.json 2>/dev/null || true
          rm -rf www/icon.png www/icon.jpg www/icon.jpeg 2>/dev/null || true
          
          echo "✅ تم تجهيز الموقع"
          echo "📁 الملفات: $(find www -type f | wc -l)"
          echo "💾 الحجم: $(du -sh www | cut -f1)"

      # ═══════════════════════════════════════
      # 📄 إنشاء package.json
      # ═══════════════════════════════════════
      - name: 📄 إنشاء package.json
        run: |
          cat > package.json << EOF
          {
            "name": "${{ github.event.inputs.app_name }}",
            "version": "1.0.0",
            "description": "تطبيق ${{ github.event.inputs.app_name }}",
            "main": "www/index.html",
            "scripts": {
              "build": "echo 'Build complete'"
            },
            "dependencies": {
              "@capacitor/android": "^5.0.0",
              "@capacitor/core": "^5.0.0",
              "@capacitor/cli": "^5.0.0",
              "@capacitor/filesystem": "^5.0.0",
              "@capacitor/app": "^5.0.0",
              "@capacitor/status-bar": "^5.0.0",
              "@capacitor/splash-screen": "^5.0.0",
              "@capacitor/keyboard": "^5.0.0",
              "@capacitor/share": "^5.0.0"
            }
          }
          EOF

      # ═══════════════════════════════════════
      # ⚙️ إعداد Capacitor الاحترافي
      # ═══════════════════════════════════════
      - name: ⚙️ إعداد Capacitor الاحترافي
        run: |
          cat > capacitor.config.json << EOF
          {
            "appId": "${{ github.event.inputs.app_id }}",
            "appName": "${{ github.event.inputs.app_name }}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"],
              "cleartext": true,
              "hostname": "localhost"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": true,
              "keyboardStyle": "DARK",
              "resizeOnFullScreen": true,
              "useLegacyBridge": false,
              "backgroundColor": "${{ github.event.inputs.app_color }}"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0,
                "launchAutoHide": true,
                "launchFadeOutDuration": 0,
                "backgroundColor": "${{ github.event.inputs.app_color }}",
                "androidSplashResourceName": "splash",
                "androidScaleType": "FIT_CENTER",
                "showSpinner": false,
                "splashFullScreen": true,
                "splashImmersive": true
              },
              "Keyboard": {
                "resize": "body",
                "style": "DARK",
                "resizeOnFullScreen": true
              },
              "StatusBar": {
                "style": "LIGHT",
                "backgroundColor": "${{ github.event.inputs.app_color }}",
                "overlaysWebView": false
              }
            }
          }
          EOF

      # ═══════════════════════════════════════
      # 📦 تثبيت المكتبات
      # ═══════════════════════════════════════
      - name: 📦 تثبيت المكتبات
        run: npm install

      # ═══════════════════════════════════════
      # 🤖 إنشاء مشروع Android
      # ═══════════════════════════════════════
      - name: 🤖 إنشاء مشروع Android
        run: npx cap add android

      # ═══════════════════════════════════════
      # 🎨 إنشاء الأيقونات
      # ═══════════════════════════════════════
      - name: 🎨 إنشاء الأيقونات بجميع المقاسات
        run: |
          ICON_FILE="${{ github.event.inputs.icon_file }}"
          
          if [ ! -f "$ICON_FILE" ]; then
            echo "⚠️ ملف الأيقونة غير موجود، سيتم إنشاء أيقونة افتراضية"
            
            APP_COLOR="${{ github.event.inputs.app_color }}"
            
            mkdir -p android/app/src/main/res/mipmap-ldpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            mkdir -p android/app/src/main/res/drawable
            
            for size in 192 144 96 72 48 36; do
              folder="mipmap-xxxhdpi"
              case $size in
                144) folder="mipmap-xxhdpi" ;;
                96) folder="mipmap-xhdpi" ;;
                72) folder="mipmap-hdpi" ;;
                48) folder="mipmap-mdpi" ;;
                36) folder="mipmap-ldpi" ;;
              esac
              
              convert -size ${size}x${size} xc:"$APP_COLOR" \
                -fill '#c9a84c' -draw "circle $(($size/2)),$(($size/2)) $(($size/2)),$(($size/4))" \
                -fill '#000000' -gravity center -pointsize $(($size/4)) -annotate +0+2 "AI" \
                "android/app/src/main/res/${folder}/ic_launcher.png" 2>/dev/null
              
              convert -size ${size}x${size} xc:"$APP_COLOR" \
                -fill '#c9a84c' -draw "roundrectangle $(($size/8)),$(($size/8)) $(($size-$size/8)),$(($size-$size/8)) $(($size/6)),$(($size/6))" \
                -fill '#000000' -gravity center -pointsize $(($size/4)) -annotate +0+2 "AI" \
                "android/app/src/main/res/${folder}/ic_launcher_round.png" 2>/dev/null
            done
            
            convert -size 192x192 xc:none \
              -fill '#c9a84c' -draw "circle 96,96 96,48" \
              -fill '#000000' -gravity center -pointsize 50 -annotate +0+2 "AI" \
              "android/app/src/main/res/drawable/ic_launcher_foreground.png" 2>/dev/null
            
            echo "✅ تم إنشاء أيقونة افتراضية ذهبية"
          else
            echo "✅ تم العثور على ملف الأيقونة"
            
            rm -rf android/app/src/main/res/mipmap-*
            rm -rf android/app/src/main/res/drawable/ic_launcher_*
            
            mkdir -p android/app/src/main/res/mipmap-ldpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            mkdir -p android/app/src/main/res/drawable
            
            convert $ICON_FILE -resize 36x36   android/app/src/main/res/mipmap-ldpi/ic_launcher.png
            convert $ICON_FILE -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            convert $ICON_FILE -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            convert $ICON_FILE -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            convert $ICON_FILE -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            convert $ICON_FILE -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            cp $ICON_FILE android/app/src/main/res/drawable/ic_launcher_foreground.png
            
            echo "✅ تم إنشاء الأيقونات من الملف المرفوع"
          fi

      # ═══════════════════════════════════════
      # 🎨 إنشاء Splash Screen
      # ═══════════════════════════════════════
      - name: 🎨 إنشاء Splash Screen فاخر
        run: |
          APP_COLOR="${{ github.event.inputs.app_color }}"
          
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values
          
          convert -size 300x300 xc:"$APP_COLOR" \
            -fill '#c9a84c' -draw "circle 150,150 150,75" \
            -fill '#000000' -gravity center -pointsize 60 -annotate +0+2 "AI" \
            "android/app/src/main/res/drawable/splash.png" 2>/dev/null
          
          cat > android/app/src/main/res/drawable/splash_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item>
                  <shape>
                      <solid android:color="${APP_COLOR}" />
                  </shape>
              </item>
              <item android:gravity="center" android:width="200dp" android:height="200dp">
                  <bitmap android:src="@drawable/splash" android:gravity="center" />
              </item>
          </layer-list>
          EOF
          
          cat > android/app/src/main/res/values/styles.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">${APP_COLOR}</item>
                  <item name="colorPrimaryDark">${APP_COLOR}</item>
                  <item name="colorAccent">#c9a84c</item>
                  <item name="android:statusBarColor">${APP_COLOR}</item>
                  <item name="android:navigationBarColor">${APP_COLOR}</item>
                  <item name="android:windowBackground">${APP_COLOR}</item>
                  <item name="android:windowSoftInputMode">adjustResize</item>
              </style>
              <style name="AppTheme.Splash" parent="AppTheme">
                  <item name="android:windowBackground">@drawable/splash_background</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/colors.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="windowBackground">${APP_COLOR}</color>
              <color name="primaryColor">${APP_COLOR}</color>
              <color name="accentColor">#c9a84c</color>
          </resources>
          EOF
          
          cat > android/app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.inputs.app_name }}</string>
              <string name="title_activity_main">${{ github.event.inputs.app_name }}</string>
              <string name="package_name">${{ github.event.inputs.app_id }}</string>
          </resources>
          EOF
          
          echo "✅ تم إنشاء Splash Screen"

      # ═══════════════════════════════════════
      # 🎨 أيقونة تكيفية
      # ═══════════════════════════════════════
      - name: 🎨 إنشاء الأيقونة التكيفية
        run: |
          cat > android/app/src/main/res/drawable/ic_launcher_background.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="${{ github.event.inputs.app_color }}"/>
          </shape>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          echo "✅ تم إنشاء الأيقونة التكيفية"

      # ═══════════════════════════════════════
      # 🔧 إعداد AndroidManifest.xml
      # ═══════════════════════════════════════
      - name: 🔧 إعداد AndroidManifest.xml مع جميع الصلاحيات
        run: |
          MANIFEST_FILE="android/app/src/main/AndroidManifest.xml"
          
          if [ -f "$MANIFEST_FILE" ]; then
            echo "📝 جاري تعديل AndroidManifest.xml..."
            
            cp $MANIFEST_FILE ${MANIFEST_FILE}.backup
            
            # إزالة الإعدادات القديمة
            sed -i 's/android:networkSecurityConfig="[^"]*"//g' $MANIFEST_FILE
            sed -i 's/android:usesCleartextTraffic="[^"]*"//g' $MANIFEST_FILE
            sed -i 's/android:hardwareAccelerated="[^"]*"//g' $MANIFEST_FILE
            sed -i 's/android:theme="[^"]*"//g' $MANIFEST_FILE
            sed -i 's/android:windowSoftInputMode="[^"]*"//g' $MANIFEST_FILE
            sed -i 's/android:requestLegacyExternalStorage="[^"]*"//g' $MANIFEST_FILE
            
            # تعديل application
            sed -i 's|<application|<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:requestLegacyExternalStorage="true" android:theme="@style/AppTheme.Splash" android:windowSoftInputMode="adjustResize"|' $MANIFEST_FILE
            
            # إضافة جميع الصلاحيات
            if ! grep -q "INTERNET" $MANIFEST_FILE; then
              sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>\n    <uses-permission android:name="android.permission.DOWNLOAD_WITHOUT_NOTIFICATION"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <uses-feature android:name="android.hardware.microphone" android:required="false"/>\n</manifest>|' $MANIFEST_FILE
            fi
            
            echo "✅ تم إضافة جميع الصلاحيات:"
            echo "  ✅ INTERNET"
            echo "  ✅ WRITE_EXTERNAL_STORAGE"
            echo "  ✅ RECORD_AUDIO"
            echo "  ✅ MODIFY_AUDIO_SETTINGS"
            echo "  ✅ CAMERA"
            echo "  ✅ requestLegacyExternalStorage"
          else
            echo "❌ ملف AndroidManifest.xml غير موجود!"
            exit 1
          fi

      # ═══════════════════════════════════════
      # ⌨️ إعداد MainActivity.java
      # ═══════════════════════════════════════
      - name: ⌨️ إعداد MainActivity.java مع دعم الصوت
        run: |
          MAIN_ACTIVITY="android/app/src/main/java/$(echo ${{ github.event.inputs.app_id }} | tr '.' '/')/MainActivity.java"
          
          if [ ! -f "$MAIN_ACTIVITY" ]; then
            MAIN_ACTIVITY=$(find android/app/src/main/java -name "MainActivity.java" -type f | head -1)
          fi
          
          if [ -f "$MAIN_ACTIVITY" ]; then
            echo "📝 جاري تعديل $MAIN_ACTIVITY..."
            
            # إضافة imports
            if ! grep -q "import android.view.WindowManager;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import android.view.WindowManager;' $MAIN_ACTIVITY
            fi
            
            if ! grep -q "import android.os.Build;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import android.os.Build;' $MAIN_ACTIVITY
            fi
            
            if ! grep -q "import androidx.core.view.WindowCompat;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import androidx.core.view.WindowCompat;' $MAIN_ACTIVITY
            fi
            
            if ! grep -q "import android.webkit.WebView;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import android.webkit.WebView;' $MAIN_ACTIVITY
            fi
            
            if ! grep -q "import android.webkit.WebSettings;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import android.webkit.WebSettings;' $MAIN_ACTIVITY
            fi
            
            if ! grep -q "import android.webkit.WebChromeClient;" $MAIN_ACTIVITY; then
              sed -i '/^package/a import android.webkit.WebChromeClient;' $MAIN_ACTIVITY
            fi
            
            # إضافة إعدادات WebView للصوت
            if ! grep -q "setMediaPlaybackRequiresUserGesture" $MAIN_ACTIVITY; then
              sed -i '/super.onCreate/a \        // دعم الصوت والوسائط في WebView\n        try {\n            WebView webView = new WebView(this);\n            WebSettings settings = webView.getSettings();\n            settings.setJavaScriptEnabled(true);\n            settings.setMediaPlaybackRequiresUserGesture(false);\n            settings.setAllowFileAccess(true);\n            settings.setAllowContentAccess(true);\n            settings.setDomStorageEnabled(true);\n            settings.setDatabaseEnabled(true);\n            settings.setLoadWithOverviewMode(true);\n            settings.setUseWideViewPort(true);\n            webView.setWebChromeClient(new WebChromeClient());\n        } catch (Exception e) {\n            e.printStackTrace();\n        }\n        \n        getWindow().setSoftInputMode(WindowManager.LayoutParams.SOFT_INPUT_ADJUST_RESIZE);\n        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {\n            WindowCompat.setDecorFitsSystemWindows(getWindow(), false);\n        }' $MAIN_ACTIVITY
            fi
            
            echo "✅ تم تعديل MainActivity.java مع دعم كامل للصوت"
          else
            echo "⚠️ لم يتم العثور على MainActivity.java"
          fi

      # ═══════════════════════════════════════
      # 🔄 مزامنة المشروع
      # ═══════════════════════════════════════
      - name: 🔄 مزامنة المشروع
        run: |
          echo "🔄 جاري مزامنة الملفات..."
          npx cap sync android
          echo "✅ تمت المزامنة"

      # ═══════════════════════════════════════
      # 🔨 بناء APK
      # ═══════════════════════════════════════
      - name: 🔨 بناء تطبيق APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # ═══════════════════════════════════════
      # 📊 معلومات الملف الناتج
      # ═══════════════════════════════════════
      - name: 📊 معلومات الملف الناتج
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "╔══════════════════════════════════════════╗"
            echo "║  ✅ تم بناء APK بنجاح                  ║"
            echo "╚══════════════════════════════════════════╝"
            echo "📱 اسم التطبيق: ${{ github.event.inputs.app_name }}"
            echo "📦 حجم الملف: $(du -h $APK_PATH | cut -f1)"
            echo "📌 الإصدار: ${{ github.event.inputs.version_name }}"
            echo ""
            echo "✨ الصلاحيات المدعومة:"
            echo "  🌐 الإنترنت"
            echo "  💾 التخزين والتحميل"
            echo "  🎙️ الميكروفون والصوت"
            echo "  📸 الكاميرا"
            echo "  ⌨️ الكيبورد"
          else
            echo "❌ فشل بناء APK"
            exit 1
          fi

      # ═══════════════════════════════════════
      # 📤 رفع إلى Artifacts
      # ═══════════════════════════════════════
      - name: 📤 رفع إلى Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-v${{ github.event.inputs.version_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ═══════════════════════════════════════
      # 🚀 إنشاء Release
      # ═══════════════════════════════════════
      - name: 🚀 إنشاء Release ورفع APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version_name }}-${{ github.run_number }}
          name: "👑 ${{ github.event.inputs.app_name }} v${{ github.event.inputs.version_name }}"
          body: |
            ## 👑 ${{ github.event.inputs.app_name }}
            
            ### 📋 معلومات التطبيق
            | البند | التفاصيل |
            |-------|----------|
            | 📱 **الاسم** | ${{ github.event.inputs.app_name }} |
            | 📌 **الإصدار** | ${{ github.event.inputs.version_name }} |
            | 🔢 **البناء** | #${{ github.run_number }} |
            | 📅 **التاريخ** | $(date +%Y-%m-%d) |
            
            ### ✨ المميزات
            - 🎨 تصميم أسطوري فاخر
            - ⚡ أداء سريع ومباشر
            - 📥 دعم تحميل الصور
            - 🎙️ دعم الصوت والميكروفون
            - 📸 دعم الكاميرا
            - ⌨️ دعم الكيبورد
            - 💾 صلاحيات تخزين كاملة
            
            ### 🔧 الصلاحيات
            ```
            ✅ INTERNET
            ✅ WRITE_EXTERNAL_STORAGE
            ✅ RECORD_AUDIO
            ✅ CAMERA
            ✅ MODIFY_AUDIO_SETTINGS
            ```
            
            ### 📥 التحميل
            حمل ملف APK من الأسفل 👇
            
            ---
            *Built with ❤️ using GitHub Actions*
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ═══════════════════════════════════════
      # 🎉 اكتمال
      # ═══════════════════════════════════════
      - name: 🎉 اكتمال البناء
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║                                              ║"
          echo "║  👑  تم بناء التطبيق بنجاح!                ║"
          echo "║  🎨  تصميم أسطوري فاخر                     ║"
          echo "║  🎙️  دعم كامل للصوت                        ║"
          echo "║  📥  تحميل الصور يعمل                       ║"
          echo "║  🚀  تم الرفع إلى Releases                 ║"
          echo "║                                              ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📥 التحميل متاح في:"
          echo "  🚀 Releases: ${{ github.server_url }}/${{ github.repository }}/releases"
          echo "  📦 Artifacts: في تبويب Actions"
