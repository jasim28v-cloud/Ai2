<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camera Filters</title>
    <style>
        :root {
            --bg: #000;
            --gold: #c9a84c;
            --gold-glow: rgba(201, 168, 76, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 12px 16px 6px;
            z-index: 10;
            background: linear-gradient(to bottom, #000, transparent);
        }

        .title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gold), #e2c97e, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 9px;
            color: #6b6355;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Camera Area */
        .camera-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Filter Sticker Layer */
        .sticker-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .sticker {
            position: absolute;
            font-size: 80px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
            animation: floatSticker 2s ease-in-out infinite;
        }

        @keyframes floatSticker {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* Controls */
        .controls {
            padding: 10px 16px 16px;
            z-index: 10;
            background: linear-gradient(to top, #000, transparent);
        }

        .filters-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filters-row::-webkit-scrollbar { display: none; }

        .filter-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #333;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: #111;
            flex-shrink: 0;
        }

        .filter-btn.active {
            border-color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
            transform: scale(1.1);
        }

        .filter-btn:hover {
            border-color: #888;
        }

        .actions-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            border-radius: 25px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-capture {
            background: linear-gradient(135deg, var(--gold), #e2c97e, var(--gold));
            color: #000;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px var(--gold-glow);
            padding: 0;
        }

        .btn-capture:active {
            transform: scale(0.9);
            box-shadow: 0 2px 10px var(--gold-glow);
        }

        .btn-switch {
            background: #222;
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            padding: 0;
            border: 1px solid #333;
        }

        .btn-switch:active {
            background: #333;
        }

        .btn-save {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            display: none;
            font-size: 11px;
            padding: 10px 20px;
        }

        .btn-save.show {
            display: inline-block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flash */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .flash.active {
            opacity: 0.8;
            transition: opacity 0s;
        }

        /* Error */
        .error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            z-index: 50;
            display: none;
        }

        .error-msg.show { display: block; }

        .error-msg button {
            margin-top: 12px;
            padding: 8px 20px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1 class="title">CAMERA AI</h1>
        <p class="subtitle">Filters & Stickers</p>
    </div>

    <!-- Camera -->
    <div class="camera-container" id="cameraContainer">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="sticker-layer" id="stickerLayer"></div>
    </div>

    <!-- Flash -->
    <div class="flash" id="flash"></div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
        <p>📷 Please allow camera access</p>
        <button onclick="startCamera()">Try Again</button>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="filters-row" id="filtersRow">
            <button class="filter-btn active" data-filter="none">📷</button>
            <button class="filter-btn" data-filter="grayscale">⚫</button>
            <button class="filter-btn" data-filter="sepia">🟤</button>
            <button class="filter-btn" data-filter="invert">🔄</button>
            <button class="filter-btn" data-filter="blur">🌫️</button>
            <button class="filter-btn" data-filter="brightness">☀️</button>
            <button class="filter-btn" data-filter="contrast">🎨</button>
            <button class="filter-btn" data-filter="hue">🌈</button>
        </div>

        <div class="actions-row">
            <button class="btn btn-switch" onclick="switchCamera()" title="Switch Camera">🔄</button>
            <button class="btn btn-capture" onclick="capturePhoto()" title="Capture">📸</button>
            <button class="btn btn-save" id="saveBtn" onclick="savePhoto()">💾 Save</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const errorMsg = document.getElementById('errorMsg');
        const saveBtn = document.getElementById('saveBtn');
        const stickerLayer = document.getElementById('stickerLayer');

        let currentFilter = 'none';
        let currentStream = null;
        let facingMode = 'user';
        let capturedImage = null;
        let stickers = [];

        // Start camera
        async function startCamera() {
            try {
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                }

                currentStream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: facingMode,
                        width: { ideal: 720 },
                        height: { ideal: 1280 }
                    },
                    audio: false
                });

                video.srcObject = currentStream;
                video.style.display = 'block';
                canvas.style.display = 'none';
                errorMsg.classList.remove('show');
                saveBtn.classList.remove('show');
                capturedImage = null;

            } catch (err) {
                console.error('Camera error:', err);
                errorMsg.classList.add('show');
            }
        }

        // Switch camera
        function switchCamera() {
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                applyFilter();
            });
        });

        // Apply CSS filter to video
        function applyFilter() {
            switch(currentFilter) {
                case 'none':
                    video.style.filter = 'none';
                    break;
                case 'grayscale':
                    video.style.filter = 'grayscale(100%)';
                    break;
                case 'sepia':
                    video.style.filter = 'sepia(100%)';
                    break;
                case 'invert':
                    video.style.filter = 'invert(100%)';
                    break;
                case 'blur':
                    video.style.filter = 'blur(3px)';
                    break;
                case 'brightness':
                    video.style.filter = 'brightness(150%)';
                    break;
                case 'contrast':
                    video.style.filter = 'contrast(200%)';
                    break;
                case 'hue':
                    video.style.filter = 'hue-rotate(90deg)';
                    break;
                default:
                    video.style.filter = 'none';
            }
        }

        // Capture photo
        function capturePhoto() {
            // Flash effect
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 100);

            // Set canvas size
            canvas.width = video.videoWidth || 720;
            canvas.height = video.videoHeight || 1280;

            // Apply filter and draw
            ctx.filter = video.style.filter || 'none';
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            ctx.filter = 'none';

            // Add stickers
            addStickersToCanvas();

            // Show captured image
            canvas.style.display = 'block';
            video.style.display = 'none';
            saveBtn.classList.add('show');
            capturedImage = canvas.toDataURL('image/png');

            // Stop camera
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
        }

        // Add random stickers to canvas
        function addStickersToCanvas() {
            const stickersList = ['👑', '😎', '💀', '🌟', '🔥', '❤️', '✨', '🦋', '🌸', '🎭', '💎', '👁️'];
            
            for (let i = 0; i < 3; i++) {
                const sticker = stickersList[Math.floor(Math.random() * stickersList.length)];
                const x = Math.random() * (canvas.width - 100);
                const y = Math.random() * (canvas.height * 0.7);
                ctx.font = '60px Arial';
                ctx.fillText(sticker, x, y + 60);
            }
        }

        // Save photo
        function savePhoto() {
            if (!capturedImage) return;

            const a = document.createElement('a');
            a.href = capturedImage;
            a.download = 'camera-ai-' + Date.now() + '.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Resume camera
            video.style.display = 'block';
            canvas.style.display = 'none';
            saveBtn.classList.remove('show');
            startCamera();
        }

        // Initialize
        startCamera();
    </script>
</body>
</html>
